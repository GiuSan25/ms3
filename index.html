<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MS3 VR - Universal Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Orbitron', sans-serif; 
            touch-action: none; 
            -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; }
        
        #vr-toggle-ui {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .cyber-button {
            padding: 12px 24px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            color: #0ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px #0ff;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: all 0.3s;
        }

        #overlay-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0ff;
            text-align: center;
            z-index: 2000;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border: 1px solid #0ff;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #hint {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #0ff;
            font-size: 10px;
            pointer-events: none;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #0ff;
            opacity: 0.7;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="hint">SISTEMA MS3 - CALIBRANDO SENSORES</div>
    <div id="overlay-msg">TOCA PARA INICIAR<br><small style="font-size: 10px; opacity: 0.6;">(Requerido para Sensores/Audio)</small></div>
    
    <div id="vr-toggle-ui">
        <button class="cyber-button" id="btn-vr-mode">PARTIZAR / MODO VR</button>
    </div>

    <script>
        let scene, camera, renderer, starField, logoGroup, startBtn3D;
        let isSplitScreen = false, hasGyro = false, appStarted = false;
        let raycaster = new THREE.Raycaster();
        let interactableObjects = [];
        let hoverTimer = 0, hoveredObject = null;
        let programScreens = [];
        
        // Sensores - Manejo universal
        let deviceQuaternion = new THREE.Quaternion();
        let worldQuaternion = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

        // Media - Ampliado para rodear al usuario
        let activeVideo = null, vSphere;
        let videos = [], textures = [];
        const urls = [
            "https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4"
        ];

        // UI 3D
        let crosshair, loadingRing;

        window.onload = () => {
            init();
            setupMedia();
            animate();
            
            // Un solo toque activa todo: Audio, Video y Sensores (Obligatorio en móviles modernos)
            window.addEventListener('touchstart', startSystem, { once: true });
            window.addEventListener('mousedown', startSystem, { once: true });

            document.getElementById('btn-vr-mode').onclick = (e) => {
                e.stopPropagation();
                toggleVR();
            };
        };

        async function startSystem() {
            document.getElementById('overlay-msg').style.display = 'none';
            document.getElementById('hint').innerText = "SISTEMA ACTIVO - MUEVE TU CELULAR";
            
            // Intentar desbloquear audio/video
            videos.forEach(v => {
                v.play().then(() => v.pause()).catch(() => {});
            });

            // Permisos de Sensor (iOS 13+)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        window.addEventListener('deviceorientation', onDeviceOrientation, true);
                    }
                } catch (e) { console.error("Error sensores:", e); }
            } else {
                window.addEventListener('deviceorientation', onDeviceOrientation, true);
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Fondo espacial denso
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for (let i = 0; i < 12000; i++) starPos.push((Math.random()-0.5)*1200, (Math.random()-0.5)*1200, (Math.random()-0.5)*1200);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x00ffff, size: 0.5, transparent: true, opacity: 0.8 }));
            scene.add(starField);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const p1 = new THREE.PointLight(0x00ffff, 2, 60); p1.position.set(10, 10, 10); scene.add(p1);
            const p2 = new THREE.PointLight(0xff00ff, 2, 60); p2.position.set(-10, -10, 10); scene.add(p2);

            create3DUI();
            create3DWordLogo();
            createStartButton();

            window.addEventListener('resize', onWindowResize);
        }

        function create3DWordLogo() {
            logoGroup = new THREE.Group();
            const loader = new THREE.FontLoader();
            loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                const textGeo = new THREE.TextGeometry("MS3", {
                    font: font, size: 2.5, height: 1, curveSegments: 12,
                    bevelEnabled: true, bevelThickness: 0.2, bevelSize: 0.1
                });
                textGeo.center();
                const bodyMat = new THREE.MeshPhongMaterial({ color: 0x050505, emissive: 0x003333, shininess: 100 });
                const mesh = new THREE.Mesh(textGeo, bodyMat);
                const edges = new THREE.LineSegments(new THREE.EdgesGeometry(textGeo), new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 }));
                logoGroup.add(mesh, edges);
            });
            logoGroup.position.set(0, 2, -10);
            scene.add(logoGroup);
        }

        function createStartButton() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(5, 1.4, 0.4), new THREE.MeshPhongMaterial({ color: 0x000000, transparent: true, opacity: 0.9 }));
            const edges = new THREE.LineSegments(new THREE.EdgesGeometry(body.geometry), new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 3 }));
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = "#00ffff"; ctx.font = "Bold 70px Orbitron"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.shadowColor = "#0ff"; ctx.shadowBlur = 20;
            ctx.fillText("COMENZAR", 256, 64);
            
            const txt = new THREE.Mesh(new THREE.PlaneGeometry(4.5, 1), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
            txt.position.z = 0.25;

            group.add(body, edges, txt);
            group.position.set(0, -3, -9);
            group.name = "btn_start";
            startBtn3D = group;
            scene.add(group);
            interactableObjects.push(body);
            body.userData.parent = group;
        }

        function setupMedia() {
            urls.forEach(url => {
                const v = document.createElement('video');
                v.src = url; v.crossOrigin = "anonymous"; v.loop = true; v.muted = true; v.playsInline = true;
                v.load();
                videos.push(v);
                textures.push(new THREE.VideoTexture(v));
            });

            const geo = new THREE.SphereGeometry(500, 60, 40);
            geo.scale(-1, 1, 1);
            vSphere = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, side: THREE.DoubleSide }));
            vSphere.visible = false;
            scene.add(vSphere);
        }

        function create3DUI() {
            const group = new THREE.Group();
            crosshair = new THREE.Mesh(new THREE.TorusGeometry(0.015, 0.001, 8, 32), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 }));
            loadingRing = new THREE.Mesh(new THREE.TorusGeometry(0.03, 0.003, 8, 32), new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0 }));
            group.add(crosshair, loadingRing);
            group.position.z = -1;
            camera.add(group);
            scene.add(camera);
        }

        function handleInteractions() {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(interactableObjects);

            if (hits.length > 0) {
                const obj = hits[0].object.userData.parent || hits[0].object;
                if (hoveredObject !== obj) { hoveredObject = obj; hoverTimer = 0; }
                hoverTimer += 1/60;
                const p = Math.min(hoverTimer / 1.5, 1);
                loadingRing.scale.set(p, p, 1);
                loadingRing.material.opacity = 1;

                if (p >= 1) {
                    if (obj.name === "btn_start") executeStart();
                    else if (obj.name === "btn_back") exitVideo();
                    else if (obj.name.startsWith("scr_")) playVideo(parseInt(obj.name.split('_')[1]));
                    hoverTimer = 0;
                }
            } else {
                hoveredObject = null; hoverTimer = 0;
                loadingRing.material.opacity = 0;
            }
        }

        function executeStart() {
            appStarted = true;
            interactableObjects = [];
            
            // Animación de salida del logo/botón
            const fadeOut = () => {
                if (logoGroup.position.y < 50) {
                    logoGroup.position.y += 0.8;
                    startBtn3D.position.y -= 0.8;
                    requestAnimationFrame(fadeOut);
                } else {
                    logoGroup.visible = false; startBtn3D.visible = false;
                    showProduction();
                }
            };
            fadeOut();
        }

        function showProduction() {
            const count = 12; // Más pantallas para rodear al usuario
            const radius = 12;
            for(let i=0; i<count; i++) {
                const angle = (i/count) * Math.PI * 2;
                const group = new THREE.Group();
                
                // Pantallas ligeramente curvas o inclinadas hacia el usuario
                const m = new THREE.Mesh(new THREE.PlaneGeometry(5.5, 3.1), new THREE.MeshBasicMaterial({ map: textures[i % textures.length] }));
                const frame = new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry), new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.5 }));
                
                group.add(m, frame);
                group.position.set(Math.cos(angle)*radius, (i%2 === 0 ? 1 : -1.5), Math.sin(angle)*radius);
                group.lookAt(0, 0, 0);
                group.name = `scr_${i}`;
                
                scene.add(group);
                programScreens.push(group);
                interactableObjects.push(m);
                m.userData.parent = group;
            }
        }

        function playVideo(idx) {
            const texIdx = idx % textures.length;
            activeVideo = videos[texIdx];
            vSphere.material.map = textures[texIdx];
            vSphere.visible = true;
            programScreens.forEach(s => s.visible = false);
            activeVideo.muted = false;
            activeVideo.play();
            
            if (!scene.getObjectByName("btn_back")) {
                const back = createFuturisticButton("CERRAR VIDEO", 0xff00ff, {x:0, y:-3.5, z:-7}, "btn_back");
                scene.add(back);
            } else {
                scene.getObjectByName("btn_back").visible = true;
            }
            interactableObjects = [scene.getObjectByName("btn_back").children[0]];

            let o = 0;
            const f = () => { if(o < 1) { o += 0.08; vSphere.material.opacity = o; requestAnimationFrame(f); } };
            f();
        }

        function exitVideo() {
            if (activeVideo) { activeVideo.pause(); activeVideo.muted = true; }
            vSphere.visible = false;
            vSphere.material.opacity = 0;
            scene.getObjectByName("btn_back").visible = false;
            programScreens.forEach(s => s.visible = true);
            interactableObjects = programScreens.map(s => s.children[0]);
        }

        function createFuturisticButton(text, color, pos, name) {
            const group = new THREE.Group();
            const b = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.8, 0.1), new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.8 }));
            const e = new THREE.LineSegments(new THREE.EdgesGeometry(b.geometry), new THREE.LineBasicMaterial({ color: color }));
            const c = document.createElement('canvas'); const x = c.getContext('2d');
            c.width = 512; c.height = 128;
            x.fillStyle = color; x.font = "Bold 50px Orbitron"; x.textAlign = "center"; x.textBaseline = "middle";
            x.fillText(text, 256, 64);
            const t = new THREE.Mesh(new THREE.PlaneGeometry(3.2, 0.6), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), transparent: true }));
            t.position.z = 0.06;
            group.add(b, e, t); group.position.set(pos.x, pos.y, pos.z); group.name = name;
            b.userData.parent = group;
            return group;
        }

        function onDeviceOrientation(e) {
            if (e.alpha !== null) {
                hasGyro = true;
                const a = THREE.MathUtils.degToRad(e.alpha);
                const b = THREE.MathUtils.degToRad(e.beta);
                const g = THREE.MathUtils.degToRad(e.gamma);
                const o = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;
                deviceQuaternion.setFromEuler(new THREE.Euler(b, a, -g, 'YXZ'));
                deviceQuaternion.multiply(worldQuaternion);
                deviceQuaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), -o));
            }
        }

        function toggleVR() { isSplitScreen = !isSplitScreen; onWindowResize(); }

        function onWindowResize() {
            const aspect = isSplitScreen ? (window.innerWidth/2)/window.innerHeight : window.innerWidth/window.innerHeight;
            camera.aspect = aspect; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (hasGyro) {
                camera.quaternion.slerp(deviceQuaternion, 0.2); // Slerp más rápido para respuesta inmediata
            }
            
            if (logoGroup && logoGroup.visible) {
                logoGroup.rotation.y += 0.015;
                logoGroup.position.y = 2 + Math.sin(Date.now() * 0.001) * 0.2;
            }
            
            if (startBtn3D && startBtn3D.visible) {
                const s = 1 + Math.sin(Date.now() * 0.003) * 0.03;
                startBtn3D.scale.set(s, s, 1);
            }

            starField.rotation.y += 0.0003;
            handleInteractions();

            if (isSplitScreen) {
                const w = window.innerWidth / 2, h = window.innerHeight;
                renderer.setScissorTest(true);
                renderer.setViewport(0,0,w,h); renderer.setScissor(0,0,w,h);
                camera.translateX(-0.06); renderer.render(scene, camera); camera.translateX(0.06);
                renderer.setViewport(w,0,w,h); renderer.setScissor(w,0,w,h);
                camera.translateX(0.06); renderer.render(scene, camera); camera.translateX(-0.06);
            } else {
                renderer.setScissorTest(false);
                renderer.render(scene, camera);
            }
        }
    </script>
</body>
</html>
