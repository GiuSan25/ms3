<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS3 VR TV - Bloque 3D Neón</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Orbitron', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #vr-toggle-ui {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .cyber-button {
            padding: 12px 24px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            color: #0ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px #0ff;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: all 0.3s;
        }

        .cyber-button:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 25px #0ff;
        }

        #hint {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #0ff;
            font-size: 12px;
            pointer-events: none;
            letter-spacing: 3px;
            text-shadow: 0 0 5px #0ff;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="hint">MS3 SYSTEM ONLINE - CONTROL POR MOVIMIENTO ACTIVO</div>
    
    <div id="vr-toggle-ui">
        <button class="cyber-button" id="btn-vr-mode">PARTIZAR / MODO VR</button>
    </div>

    <script>
        let scene, camera, renderer, starField, logoGroup, startBtn3D;
        let isSplitScreen = false, hasGyro = false, appStarted = false;
        let raycaster = new THREE.Raycaster();
        let interactableObjects = [];
        let hoverTimer = 0, hoveredObject = null;
        let programScreens = [];
        
        // Sensores
        let deviceQuaternion = new THREE.Quaternion();
        let worldQuaternion = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

        // Media
        let activeVideo = null, vSphere;
        let videos = [], textures = [];
        const urls = [
            "https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
            "uploaded:WhatsApp Video 2026-03-05 at 4.09.06 PM.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4"
        ];

        // UI 3D
        let crosshair, loadingRing;

        window.onload = () => {
            init();
            setupMedia();
            animate();
            
            window.addEventListener('click', startAudioAndSensors, { once: true });
            document.getElementById('btn-vr-mode').onclick = (e) => {
                e.stopPropagation();
                toggleVR();
            };
        };

        function startAudioAndSensors() {
            videos.forEach(v => v.play().then(() => v.pause()).catch(() => {}));
            requestSensors();
        }

        function requestSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') window.addEventListener('deviceorientation', onDeviceOrientation, true);
                });
            } else {
                window.addEventListener('deviceorientation', onDeviceOrientation, true);
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Espacio de estrellas
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for (let i = 0; i < 9000; i++) starPos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x00ffff, size: 0.6, transparent: true, opacity: 0.8 }));
            scene.add(starField);

            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            const p1 = new THREE.PointLight(0x00ffff, 2, 50); p1.position.set(5, 5, 5); scene.add(p1);
            const p2 = new THREE.PointLight(0xff00ff, 2, 50); p2.position.set(-5, -5, 5); scene.add(p2);

            create3DUI();
            create3DWordLogo();
            createStartButton();

            window.addEventListener('resize', onWindowResize);
        }

        // Crea las letras MS3 como un bloque unido con bordes de neón
        function create3DWordLogo() {
            logoGroup = new THREE.Group();
            const loader = new THREE.FontLoader();
            loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                const textStr = "MS3";
                const textGeo = new THREE.TextGeometry(textStr, {
                    font: font,
                    size: 2.5,
                    height: 0.8, // Grosor 3D
                    curveSegments: 12,
                    bevelEnabled: true,
                    bevelThickness: 0.15,
                    bevelSize: 0.05,
                    bevelOffset: 0,
                    bevelSegments: 5
                });
                
                textGeo.center(); // Centrar toda la palabra para que rote sobre su eje medio

                // Material del cuerpo (Oscuro/Metálico)
                const bodyMat = new THREE.MeshPhongMaterial({ 
                    color: 0x111111,
                    emissive: 0x002222,
                    shininess: 100,
                    specular: 0x00ffff
                });

                // Material de los bordes (Neón)
                const edgeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });

                const mesh = new THREE.Mesh(textGeo, bodyMat);
                
                // Añadir bordes de neón para mejor definición
                const edges = new THREE.EdgesGeometry(textGeo);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 }));
                
                // Pequeño resplandor interno
                const glowMesh = new THREE.Mesh(textGeo, new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.15 }));
                glowMesh.scale.multiplyScalar(1.02);

                logoGroup.add(mesh, line, glowMesh);
            });

            logoGroup.position.set(0, 1.5, -9);
            scene.add(logoGroup);
        }

        function createStartButton() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(4.5, 1.2, 0.3), new THREE.MeshPhongMaterial({ color: 0x000000, transparent: true, opacity: 0.8 }));
            const edges = new THREE.LineSegments(new THREE.EdgesGeometry(body.geometry), new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 3 }));
            
            // Efecto de resplandor para el botón
            const glow = new THREE.Mesh(new THREE.BoxGeometry(4.6, 1.3, 0.1), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.1 }));
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = "#00ffff"; ctx.font = "Bold 65px Orbitron"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.shadowColor = "#0ff"; ctx.shadowBlur = 20;
            ctx.fillText("COMENZAR", 256, 64);
            
            const txt = new THREE.Mesh(new THREE.PlaneGeometry(4, 0.9), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
            txt.position.z = 0.2;

            group.add(body, edges, glow, txt);
            group.position.set(0, -2.5, -8);
            group.name = "btn_start";
            startBtn3D = group;
            scene.add(group);
            interactableObjects.push(body);
            body.userData.parent = group;
        }

        function setupMedia() {
            urls.forEach(url => {
                const v = document.createElement('video');
                v.src = url; v.crossOrigin = "anonymous"; v.loop = true; v.muted = true; v.playsInline = true;
                v.load();
                videos.push(v);
                textures.push(new THREE.VideoTexture(v));
            });

            const geo = new THREE.SphereGeometry(500, 60, 40);
            geo.scale(-1, 1, 1);
            vSphere = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 }));
            vSphere.visible = false;
            scene.add(vSphere);
        }

        function create3DUI() {
            const group = new THREE.Group();
            crosshair = new THREE.Mesh(new THREE.TorusGeometry(0.015, 0.001, 8, 32), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 }));
            loadingRing = new THREE.Mesh(new THREE.TorusGeometry(0.03, 0.003, 8, 32), new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0 }));
            group.add(crosshair, loadingRing);
            group.position.z = -1;
            camera.add(group);
            scene.add(camera);
        }

        function handleInteractions() {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(interactableObjects);

            if (hits.length > 0) {
                const obj = hits[0].object.userData.parent || hits[0].object;
                if (hoveredObject !== obj) { hoveredObject = obj; hoverTimer = 0; }
                hoverTimer += 1/60;
                const p = Math.min(hoverTimer / 1.5, 1);
                loadingRing.scale.set(p, p, 1);
                loadingRing.material.opacity = 1;

                if (p >= 1) {
                    if (obj.name === "btn_start") executeStart();
                    else if (obj.name === "btn_back") exitVideo();
                    else if (obj.name.startsWith("scr_")) playVideo(parseInt(obj.name.split('_')[1]));
                    hoverTimer = 0;
                }
            } else {
                hoveredObject = null; hoverTimer = 0;
                loadingRing.material.opacity = 0;
            }
        }

        function executeStart() {
            appStarted = true;
            interactableObjects = [];
            const anim = () => {
                if (logoGroup.position.y < 40) {
                    logoGroup.position.y += 0.5;
                    startBtn3D.position.y -= 0.5;
                    requestAnimationFrame(anim);
                } else {
                    logoGroup.visible = false; startBtn3D.visible = false;
                    showProduction();
                }
            };
            anim();
        }

        function showProduction() {
            const r = 10;
            for(let i=0; i<6; i++) {
                const a = (i/6) * Math.PI * 2;
                const group = new THREE.Group();
                const m = new THREE.Mesh(new THREE.PlaneGeometry(5, 2.8), new THREE.MeshBasicMaterial({ map: textures[i] }));
                const frame = new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry), new THREE.LineBasicMaterial({ color: 0x00ffff }));
                group.add(m, frame);
                group.position.set(Math.cos(a)*r, 0, Math.sin(a)*r);
                group.lookAt(0, 0, 0);
                group.name = `scr_${i}`;
                scene.add(group);
                programScreens.push(group);
                interactableObjects.push(m);
                m.userData.parent = group;
            }
        }

        function playVideo(idx) {
            activeVideo = videos[idx];
            vSphere.material.map = textures[idx];
            vSphere.visible = true;
            programScreens.forEach(s => s.visible = false);
            activeVideo.muted = false;
            activeVideo.play();
            
            if (!scene.getObjectByName("btn_back")) {
                const back = createFuturisticButton("VOLVER", 0xff00ff, {x:0, y:-3, z:-6}, "btn_back");
                scene.add(back);
            } else {
                scene.getObjectByName("btn_back").visible = true;
            }
            interactableObjects = [scene.getObjectByName("btn_back").children[0]];

            let o = 0;
            const f = () => { if(o < 1) { o += 0.05; vSphere.material.opacity = o; requestAnimationFrame(f); } };
            f();
        }

        function exitVideo() {
            if (activeVideo) { activeVideo.pause(); activeVideo.muted = true; }
            vSphere.visible = false;
            scene.getObjectByName("btn_back").visible = false;
            programScreens.forEach(s => s.visible = true);
            interactableObjects = programScreens.map(s => s.children[0]);
        }

        function createFuturisticButton(text, color, pos, name) {
            const group = new THREE.Group();
            const b = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.7, 0.1), new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.8 }));
            const e = new THREE.LineSegments(new THREE.EdgesGeometry(b.geometry), new THREE.LineBasicMaterial({ color: color }));
            const c = document.createElement('canvas'); const x = c.getContext('2d');
            c.width = 256; c.height = 64;
            x.fillStyle = color; x.font = "Bold 30px Orbitron"; x.textAlign = "center"; x.textBaseline = "middle";
            x.fillText(text, 128, 32);
            const t = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 0.5), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), transparent: true }));
            t.position.z = 0.06;
            group.add(b, e, t); group.position.set(pos.x, pos.y, pos.z); group.name = name;
            b.userData.parent = group;
            return group;
        }

        function onDeviceOrientation(e) {
            if (e.alpha !== null) {
                hasGyro = true;
                const a = THREE.MathUtils.degToRad(e.alpha);
                const b = THREE.MathUtils.degToRad(e.beta);
                const g = THREE.MathUtils.degToRad(e.gamma);
                const o = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;
                deviceQuaternion.setFromEuler(new THREE.Euler(b, a, -g, 'YXZ'));
                deviceQuaternion.multiply(worldQuaternion);
                deviceQuaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), -o));
            }
        }

        function toggleVR() { isSplitScreen = !isSplitScreen; onWindowResize(); }

        function onWindowResize() {
            const aspect = isSplitScreen ? (window.innerWidth/2)/window.innerHeight : window.innerWidth/window.innerHeight;
            camera.aspect = aspect; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (hasGyro) {
                camera.quaternion.slerp(deviceQuaternion, 0.15);
            }
            if (logoGroup && logoGroup.visible) {
                // Rotación de todo el bloque MS3 junto
                logoGroup.rotation.y += 0.015;
                // Efecto de flotación suave
                logoGroup.position.y = 1.5 + Math.sin(Date.now() * 0.001) * 0.15;
            }
            
            if (startBtn3D && startBtn3D.visible) {
                // Latido neón en el botón comenzar
                const s = 1 + Math.sin(Date.now() * 0.003) * 0.03;
                startBtn3D.scale.set(s, s, 1);
            }

            starField.rotation.y += 0.0003;
            handleInteractions();

            if (isSplitScreen) {
                const w = window.innerWidth / 2, h = window.innerHeight;
                renderer.setScissorTest(true);
                renderer.setViewport(0,0,w,h); renderer.setScissor(0,0,w,h);
                camera.translateX(-0.06); renderer.render(scene, camera); camera.translateX(0.06);
                renderer.setViewport(w,0,w,h); renderer.setScissor(w,0,w,h);
                camera.translateX(0.06); renderer.render(scene, camera); camera.translateX(-0.06);
            } else {
                renderer.setScissorTest(false);
                renderer.render(scene, camera);
            }
        }
    </script>
</body>
</html>
