<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MS3 VR TV - Multi Video 360</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #ui-overlay { position: absolute; top: 20px; left: 20px; z-index: 100; }
        .vr-button {
            padding: 15px 25px; background: rgba(0, 255, 255, 0.1); border: 2px solid #0ff;
            color: #0ff; border-radius: 10px; cursor: pointer; backdrop-filter: blur(10px);
            font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5); transition: all 0.3s;
        }
        #hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.6); font-size: 14px; pointer-events: none; z-index: 10; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <button class="vr-button" id="btn-vr">ENTRAR / MODO VR</button>
    </div>
    <div id="hint">Usa el cursor para mirar o activa el modo VR</div>

    <script>
        let scene, camera, renderer, starField, logoGroup, startButton, backButton;
        let isSplitScreen = false, hasGyro = false;
        let lon = 0, lat = 0, phi = 0, theta = 0;
        let onPointerDownPointerX, onPointerDownPointerY, onPointerDownLon, onPointerDownLat;
        let deviceQuaternion = new THREE.Quaternion();
        let raycaster = new THREE.Raycaster();
        let interactableObjects = [];
        let hoverTimer = 0, hoveredObject = null;
        let appState = 'intro';
        let programScreens = [], letterMeshes = [];
        let activeVideo = null, videoSphere;
        let v1, v2, v3, v4, v5, v6;
        let t1, t2, t3, t4, t5, t6;
        let crosshair3D, loadingRing3D;

        // URLs de video
        const url1 = "https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4";
        const url2 = "video2.mp4"; 
        const url3 = "https://storage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4";
        const url4 = "otro_video.mp4"; 
        const url5 = "https://storage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4";
        const url6 = "video6.mp4";

        window.onload = function() {
            init();
            setupMedia();
            animate();
            
            document.getElementById('btn-vr').onclick = function() {
                // Desbloqueo de video para navegadores
                [v1, v2, v3, v4, v5, v6].forEach(v => { v.play().then(() => v.pause()).catch(() => {}); });
                toggleSplitScreen();
                requestGyroPermission();
            };
        }

        function setupMedia() {
            v1 = createVideoElement(url1); t1 = new THREE.VideoTexture(v1);
            v2 = createVideoElement(url2); t2 = new THREE.VideoTexture(v2);
            v3 = createVideoElement(url3); t3 = new THREE.VideoTexture(v3);
            v4 = createVideoElement(url4); t4 = new THREE.VideoTexture(v4);
            v5 = createVideoElement(url5); t5 = new THREE.VideoTexture(v5);
            v6 = createVideoElement(url6); t6 = new THREE.VideoTexture(v6);
            
            const sphereGeo = new THREE.SphereGeometry(500, 60, 40);
            sphereGeo.scale(-1, 1, 1);
            videoSphere = new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, color: 0x222222 }));
            videoSphere.visible = false;
            scene.add(videoSphere);
        }

        function createVideoElement(url) {
            const v = document.createElement('video');
            v.src = url;
            v.crossOrigin = "anonymous";
            v.loop = true; v.muted = true;
            v.setAttribute('playsinline', '');
            v.setAttribute('webkit-playsinline', '');
            v.load();
            return v;
        }

        function requestGyroPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => { if (response == 'granted') window.addEventListener('deviceorientation', onDeviceOrientation, true); })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', onDeviceOrientation, true);
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1100);
            camera.rotation.reorder('YXZ');

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const starGeo = new THREE.BufferGeometry();
            const starVerts = [];
            for (let i = 0; i < 5000; i++) starVerts.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
            starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 }));
            scene.add(starField);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            create3DUI();
            createMS3Logo();
            
            startButton = createFuturisticButton("COMENZAR", 0x00ffff, { x: 0, y: -1.5, z: -5 }, "btn_start");
            backButton = createFuturisticButton("SALIR", 0xff0055, { x: 0, y: -2.5, z: -4.5 }, "btn_back");
            backButton.visible = false;

            document.addEventListener('pointerdown', onPointerDown);
            document.addEventListener('pointermove', onPointerMove);
            window.addEventListener('resize', onWindowResize);
        }

        function createFuturisticButton(text, neonColor, pos, name) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.8, 0.15), new THREE.MeshPhongMaterial({ color: 0x000a1a, transparent: true, opacity: 0.8, emissive: neonColor, emissiveIntensity: 0.3 }));
            group.add(body);
            group.add(new THREE.LineSegments(new THREE.EdgesGeometry(body.geometry), new THREE.LineBasicMaterial({ color: neonColor })));

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = "white"; ctx.font = "Bold 60px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(text, 256, 64);
            const textMesh = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 0.6), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
            textMesh.position.z = 0.1;
            group.add(textMesh);

            group.position.set(pos.x, pos.y, pos.z);
            group.name = name;
            scene.add(group);
            interactableObjects.push(body);
            body.userData.parentGroup = group;
            return group;
        }

        function create3DUI() {
            const uiGroup = new THREE.Group();
            crosshair3D = new THREE.Mesh(new THREE.TorusGeometry(0.015, 0.002, 8, 32), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 }));
            loadingRing3D = new THREE.Mesh(new THREE.TorusGeometry(0.03, 0.004, 8, 32), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0 }));
            uiGroup.add(crosshair3D, loadingRing3D);
            uiGroup.position.z = -1;
            camera.add(uiGroup);
            scene.add(camera);
        }

        function handleInteractions() {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(interactableObjects);

            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                const parent = mesh.userData.parentGroup || mesh;
                
                if (hoveredObject !== parent) { hoveredObject = parent; hoverTimer = 0; }
                hoverTimer += 1 / 60;
                const progress = Math.min(hoverTimer / 1.5, 1);
                
                loadingRing3D.scale.set(progress, progress, 1);
                loadingRing3D.material.opacity = 1;

                if (progress >= 1) {
                    if (parent.name === "btn_start") startTransition();
                    else if (parent.name === "btn_back") exitVideoMode();
                    else if (parent.name.includes("screen_v")) {
                        const vMap = { screen_v1: [v1,t1], screen_v2: [v2,t2], screen_v3: [v3,t3], screen_v4: [v4,t4], screen_v5: [v5,t5], screen_v6: [v6,t6] };
                        enterVideoMode(vMap[parent.name][0], vMap[parent.name][1]);
                    }
                    hoverTimer = 0;
                }
            } else {
                hoveredObject = null; hoverTimer = 0;
                loadingRing3D.material.opacity = 0;
            }
        }

        function enterVideoMode(vid, tex) {
            appState = 'video_vr';
            activeVideo = vid;
            interactableObjects = [backButton.children[0]];
            videoSphere.material.map = tex;
            videoSphere.visible = true;
            backButton.visible = true;
            programScreens.forEach(s => s.visible = false);
            activeVideo.muted = false;
            activeVideo.play().catch(e => console.log("Error play:", e));
            let op = 0;
            const fadeIn = () => { if(op < 1) { op += 0.05; videoSphere.material.opacity = op; requestAnimationFrame(fadeIn); } };
            fadeIn();
        }

        function exitVideoMode() {
            if (activeVideo) { activeVideo.pause(); activeVideo.muted = true; }
            let op = 1;
            const fadeOut = () => {
                if(op > 0) { op -= 0.05; videoSphere.material.opacity = op; requestAnimationFrame(fadeOut); }
                else { videoSphere.visible = false; backToPrograms(); }
            };
            fadeOut();
        }

        function backToPrograms() {
            appState = 'production';
            backButton.visible = false;
            programScreens.forEach(s => s.visible = true);
            interactableObjects = programScreens;
        }

        function startProduction() {
            const count = 6;
            const textures = [t1, t2, t3, t4, t5, t6];
            for(let i=0; i<count; i++) {
                const a = (i / count) * Math.PI * 2;
                const r = 7;
                const s = new THREE.Mesh(new THREE.PlaneGeometry(4, 2.3), new THREE.MeshBasicMaterial({ map: textures[i] }));
                s.position.set(Math.cos(a)*r, 0.5, Math.sin(a)*r);
                s.lookAt(0, 0.5, 0);
                s.name = "screen_v" + (i+1);
                s.add(new THREE.LineSegments(new THREE.EdgesGeometry(s.geometry), new THREE.LineBasicMaterial({ color: 0x00ffff })));
                scene.add(s);
                programScreens.push(s);
            }
            interactableObjects = programScreens;
            appState = 'production';
        }

        function startTransition() {
            appState = 'out';
            interactableObjects = [];
            const anim = () => {
                if (logoGroup.position.y < 12) {
                    logoGroup.position.y += 0.2;
                    startButton.position.y -= 0.2;
                    requestAnimationFrame(anim);
                } else {
                    logoGroup.visible = false; startButton.visible = false;
                    startProduction();
                }
            };
            anim();
        }

        function createMS3Logo() {
            logoGroup = new THREE.Group();
            const sideMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            function createTex(l) {
                const c = document.createElement('canvas'); const x = c.getContext('2d');
                c.width = 512; c.height = 512;
                x.fillStyle = "#00ffff"; x.fillRect(0,0,512,512);
                x.fillStyle = "black"; x.font = "Bold 350px Arial"; x.textAlign = "center"; x.textBaseline = "middle";
                x.fillText(l, 256, 256);
                return new THREE.CanvasTexture(c);
            }
            ['M', 'S', '3'].forEach((l, i) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 0.5), [sideMat, sideMat, sideMat, sideMat, new THREE.MeshPhongMaterial({ map: createTex(l) }), sideMat]);
                const container = new THREE.Group(); container.add(m); container.position.x = (i - 1) * 1.6;
                logoGroup.add(container); letterMeshes.push(container);
            });
            logoGroup.position.set(0, 1, -6);
            scene.add(logoGroup);
        }

        function onDeviceOrientation(e) {
            if (e.alpha !== null) {
                hasGyro = true;
                const alpha = THREE.MathUtils.degToRad(e.alpha), beta = THREE.MathUtils.degToRad(e.beta), gamma = THREE.MathUtils.degToRad(e.gamma);
                const orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;
                const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
                deviceQuaternion.setFromEuler(euler);
                deviceQuaternion.multiply(new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)));
                deviceQuaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -orient));
            }
        }

        function onPointerDown(e) { onPointerDownPointerX = e.clientX; onPointerDownPointerY = e.clientY; onPointerDownLon = lon; onPointerDownLat = lat; }
        function onPointerMove(e) { if (e.buttons > 0 && !hasGyro) { lon = (onPointerDownPointerX - e.clientX) * 0.15 + onPointerDownLon; lat = (e.clientY - onPointerDownPointerY) * 0.15 + onPointerDownLat; } }
        function toggleSplitScreen() { isSplitScreen = !isSplitScreen; onWindowResize(); document.getElementById('btn-vr').innerText = isSplitScreen ? "MODO NORMAL" : "MODO GAFAS VR"; }
        function onWindowResize() { 
            const aspect = isSplitScreen ? (window.innerWidth/2)/window.innerHeight : window.innerWidth/window.innerHeight;
            camera.aspect = aspect; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (hasGyro) {
                camera.quaternion.copy(deviceQuaternion);
            } else {
                lat = Math.max(-85, Math.min(85, lat));
                phi = THREE.MathUtils.degToRad(90 - lat); theta = THREE.MathUtils.degToRad(lon);
                camera.lookAt(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
            }
            if (logoGroup && logoGroup.visible) {
                logoGroup.rotation.y += 0.005;
                letterMeshes.forEach((m, idx) => m.rotation.y += 0.01 + (idx * 0.005));
            }
            starField.rotation.y += 0.0005;
            handleInteractions();

            if (isSplitScreen) {
                const w = window.innerWidth / 2, h = window.innerHeight;
                renderer.setScissorTest(true);
                renderer.setViewport(0, 0, w, h); renderer.setScissor(0, 0, w, h);
                camera.translateX(-0.06); renderer.render(scene, camera); camera.translateX(0.06);
                renderer.setViewport(w, 0, w, h); renderer.setScissor(w, 0, w, h);
                camera.translateX(0.06); renderer.render(scene, camera); camera.translateX(-0.06);
            } else {
                renderer.setScissorTest(false);
                renderer.render(scene, camera);
            }
        }
    </script>
</body>
</html>
