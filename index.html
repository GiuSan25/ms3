<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MS3 VR TV - Consola Pro con IA</title>
    <!-- Librería Three.js para el motor 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000;
            font-family: 'Orbitron', sans-serif; 
            touch-action: none; 
            -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; }
        
        #vr-toggle-ui {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .cyber-button {
            padding: 12px 24px;
            background: rgba(138, 43, 226, 0.15);
            border: 2px solid #8a2be2;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: all 0.3s;
            text-shadow: 0 0 10px #8a2be2;
        }

        #hint {
            position: absolute;
            top: 25px;
            width: 100%;
            text-align: center;
            color: #bf7afc;
            font-size: 14px;
            pointer-events: none;
            letter-spacing: 4px;
            text-shadow: 0 0 12px #8a2be2;
            z-index: 2000;
            text-transform: uppercase;
            font-weight: bold;
        }

        #ai-status {
            position: absolute;
            top: 60px;
            width: 100%;
            text-align: center;
            color: #00ffff;
            font-size: 12px;
            z-index: 2000;
            text-shadow: 0 0 8px #00ffff;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="hint">BIENVENIDO A MS3</div>
    <div id="ai-status">ESCUCHANDO...</div>
    
    <div id="vr-toggle-ui">
        <button class="cyber-button" id="btn-vr-mode">MODO VR</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const apiKey = ""; // La plataforma proporciona la clave automáticamente
        const firebaseConfig = {
            apiKey: "",
            authDomain: "default-app.firebaseapp.com",
            projectId: "default-app",
            storageBucket: "default-app.appspot.com",
            messagingSenderId: "0",
            appId: "0"
        };

        let auth = null;
        try {
            if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "") {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
            }
        } catch (e) { console.error(e); }

        let scene, camera, renderer, logoGroup, startBtn3D, keyboardGroup;
        let isSplitScreen = false, hasGyro = false, currentView = "HOME"; 
        let raycaster = new THREE.Raycaster();
        let interactableObjects = [];
        let hoverTimer = 0, hoveredObject = null;
        let starSystems = [], programScreens = [], videos = [], textures = [];
        let mouseX = 0, mouseY = 0, targetRotationX = 0, targetRotationY = 0;
        let deviceQuaternion = new THREE.Quaternion();
        let worldQuaternion = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));
        let activeVideo = null, vSphere, crosshair, loadingRing;

        const videoUrls = [
            "https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4"
        ];

        // --- ASISTENTE DE IA ---
        async function askAI() {
            const statusEl = document.getElementById('ai-status');
            statusEl.style.opacity = "1";
            statusEl.innerText = "ESCUCHANDO...";

            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-ES';
            recognition.start();

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                statusEl.innerText = "PROCESANDO: " + transcript;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: transcript }] }],
                            systemInstruction: { parts: [{ text: "Eres el asistente de IA de la consola MS3 VR TV. Responde de forma futurista, breve y técnica." }] }
                        })
                    });
                    const data = await response.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error en conexión neuronal.";
                    
                    statusEl.innerText = "HABLANDO...";
                    await speakAI(aiText);
                    statusEl.style.opacity = "0";
                } catch (err) {
                    statusEl.innerText = "ERROR DE SISTEMA";
                    console.error(err);
                }
            };

            recognition.onerror = () => {
                statusEl.innerText = "NO TE HE OÍDO";
                setTimeout(() => statusEl.style.opacity = "0", 2000);
            };
        }

        async function speakAI(text) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say in a futuristic voice: ${text}` }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });
                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                
                // Conversión de PCM16 a WAV (simplificada para ejecución directa)
                const binaryString = atob(audioData);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                
                const blob = new Blob([createWavHeader(bytes.buffer, 24000), bytes.buffer], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);
                await audio.play();
            } catch (e) { console.error("TTS Error:", e); }
        }

        function createWavHeader(buffer, sampleRate) {
            const length = buffer.byteLength;
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + length, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, length, true);
            return header;
        }

        // --- LÓGICA 3D ---
        window.onload = () => { init(); setupMedia(); animate(); };

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a001a, 0.0003);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            createStars(60000, 0.4, 0.00005, 0x8a2be2, 4000);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            
            create3DUI();
            createFuturisticLogo();
            createStartButton();
            create3DKeyboard();
            
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', (e) => {
                if(!hasGyro) {
                    mouseX = (e.clientX/window.innerWidth)*2-1;
                    mouseY = -(e.clientY/window.innerHeight)*2+1;
                    targetRotationY = mouseX * 0.5; targetRotationX = mouseY * 0.3;
                }
            });
            window.addEventListener('mousedown', () => {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission();
                }
            });
            document.getElementById('btn-vr-mode').onclick = () => { isSplitScreen = !isSplitScreen; onWindowResize(); };
        }

        function createStars(count, size, speed, color, range) {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for (let i = 0; i < count; i++) pos.push((Math.random()-0.5)*range, (Math.random()-0.5)*range, (Math.random()-0.5)*range);
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const points = new THREE.Points(geo, new THREE.PointsMaterial({ size, color, transparent: true, opacity: 0.8 }));
            scene.add(points);
            starSystems.push({ mesh: points, speed });
        }

        function createFuturisticLogo() {
            logoGroup = new THREE.Group();
            const loader = new THREE.FontLoader();
            loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                const textGeo = new THREE.TextGeometry("MS3", { font, size: 5, height: 2, curveSegments: 12 });
                textGeo.center();
                const mesh = new THREE.Mesh(textGeo, new THREE.MeshPhongMaterial({ color: 0x000000, emissive: 0x110022 }));
                const neon = new THREE.LineSegments(new THREE.EdgesGeometry(textGeo), new THREE.LineBasicMaterial({ color: 0x00ffff }));
                logoGroup.add(mesh, neon);
            });
            logoGroup.position.set(0, 4, -15);
            scene.add(logoGroup);
        }

        function createStartButton() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(6, 2.5, 1), new THREE.MeshPhongMaterial({ color: 0x111111 }));
            const edge = new THREE.LineSegments(new THREE.EdgesGeometry(body.geometry), new THREE.LineBasicMaterial({ color: 0x00ffff }));
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = "#00ffff"; ctx.font = "Bold 70px Arial"; ctx.textAlign="center"; ctx.fillText("INICIAR", 256, 80);
            const txt = new THREE.Mesh(new THREE.PlaneGeometry(5, 1.2), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
            txt.position.z = 0.55;
            group.add(body, edge, txt);
            group.position.set(0, -5, -12);
            startBtn3D = group;
            scene.add(group);
            interactableObjects.push(body);
            body.userData = { isStart: true, originalZ: -12 };
        }

        function create3DKeyboard() {
            keyboardGroup = new THREE.Group();
            const createKey = (x, z, label, type) => {
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(5.0, 1.8, 0.8), new THREE.MeshPhongMaterial({ color: 0x111111 }));
                const edge = new THREE.LineSegments(new THREE.EdgesGeometry(body.geometry), new THREE.LineBasicMaterial({ color: 0x8a2be2 }));
                const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 128;
                const ctx = canvas.getContext('2d'); ctx.fillStyle = "#ffffff"; ctx.font = "Bold 80px Arial"; ctx.textAlign="center"; ctx.fillText(label, 256, 85);
                const txt = new THREE.Mesh(new THREE.PlaneGeometry(4.2, 1.3), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
                txt.position.z = 0.45;
                group.add(body, edge, txt);
                group.position.set(x, 0, z);
                body.userData = { [type]: true, label: label, originalZ: z };
                interactableObjects.push(body);
                return group;
            };
            keyboardGroup.add(createKey(-6.0, 0, "INICIO", "isReset"));
            keyboardGroup.add(createKey(0, 0, "IA", "isAI"));
            keyboardGroup.add(createKey(6.0, 0, "JUEGOS", "isGames"));
            keyboardGroup.position.set(0, -9.5, -10);
            keyboardGroup.visible = false;
            scene.add(keyboardGroup);
        }

        function setupMedia() {
            videoUrls.forEach(url => {
                const v = document.createElement('video'); v.src = url; v.crossOrigin = "anonymous"; v.loop = true; v.muted = true; v.playsInline = true;
                videos.push(v); textures.push(new THREE.VideoTexture(v));
            });
            vSphere = new THREE.Mesh(new THREE.SphereGeometry(100, 32, 32).scale(-1,1,1), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 }));
            vSphere.visible = false;
            scene.add(vSphere);
        }

        function create3DUI() {
            crosshair = new THREE.Mesh(new THREE.RingGeometry(0.015, 0.018, 32), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 }));
            loadingRing = new THREE.Mesh(new THREE.RingGeometry(0.02, 0.025, 32), new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0 }));
            const ui = new THREE.Group(); ui.add(crosshair, loadingRing); ui.position.z = -1;
            camera.add(ui); scene.add(camera);
        }

        function handleInteractions() {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(interactableObjects);
            if (hits.length > 0) {
                const hit = hits[0].object;
                if (hoveredObject !== hit) { hoveredObject = hit; hoverTimer = 0; }
                hoverTimer += 1/60;
                const p = Math.min(hoverTimer / 1.2, 1);
                loadingRing.material.opacity = 1;
                loadingRing.scale.set(p * 1.5, p * 1.5, 1);
                if (p >= 1) {
                    if (hit.userData.isStart) executeStart();
                    if (hit.userData.isAI) askAI();
                    if (hit.userData.isReset) location.reload();
                    if (hit.userData.id !== undefined) playVideo(hit.userData.id);
                    if (hit.userData.isBack) exitMedia();
                    hoverTimer = 0;
                }
            } else { hoveredObject = null; hoverTimer = 0; loadingRing.material.opacity = 0; }
        }

        function executeStart() {
            currentView = "PROGRAMS"; startBtn3D.visible = false;
            logoGroup.position.set(0, 18, -35); logoGroup.scale.set(0.5, 0.5, 0.5);
            keyboardGroup.visible = true; showPrograms();
        }

        function showPrograms() {
            const r = 22; const count = 10;
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const group = new THREE.Group();
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(8, 4.5), new THREE.MeshBasicMaterial({ map: textures[i % textures.length] }));
                group.add(mesh); group.position.set(Math.cos(angle)*r, 0, Math.sin(angle)*r); group.lookAt(0, 0, 0);
                scene.add(group); programScreens.push(group);
                mesh.userData.id = i; interactableObjects.push(mesh);
            }
        }

        function playVideo(id) {
            currentView = "PLAYING";
            activeVideo = videos[id % textures.length];
            vSphere.material.map = textures[id % textures.length];
            vSphere.visible = true; vSphere.material.opacity = 1;
            logoGroup.visible = false; keyboardGroup.visible = false;
            activeVideo.muted = false; activeVideo.play();
            const back = new THREE.Mesh(new THREE.BoxGeometry(4, 1.2, 0.2), new THREE.MeshBasicMaterial({ color: 0xff0044 }));
            back.position.set(0, -10, -15); back.userData.isBack = true;
            scene.add(back); interactableObjects = [back];
        }

        function exitMedia() { location.reload(); }

        function onWindowResize() {
            const aspect = isSplitScreen ? (window.innerWidth/2)/window.innerHeight : window.innerWidth/window.innerHeight;
            camera.aspect = aspect; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            if (hasGyro) camera.quaternion.slerp(deviceQuaternion, 0.1);
            else { camera.rotation.y += (targetRotationY - camera.rotation.y)*0.05; camera.rotation.x += (targetRotationX - camera.rotation.x)*0.05; }
            logoGroup.rotation.y += 0.01;
            starSystems.forEach(s => s.mesh.rotation.y += s.speed);
            handleInteractions();
            if (isSplitScreen) {
                const w = window.innerWidth/2, h = window.innerHeight;
                renderer.setScissorTest(true);
                renderer.setViewport(0,0,w,h); renderer.setScissor(0,0,w,h);
                camera.position.x = -0.05; renderer.render(scene, camera);
                renderer.setViewport(w,0,w,h); renderer.setScissor(w,0,w,h);
                camera.position.x = 0.05; renderer.render(scene, camera);
                camera.position.x = 0;
            } else { renderer.setScissorTest(false); renderer.render(scene, camera); }
        }
    </script>
</body>
</html>
