<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MS3 VR - Avatar LUX & Games</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Orbitron', sans-serif; 
            touch-action: none; 
            -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; }
        
        #vr-toggle-ui {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .cyber-button {
            padding: 12px 24px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            color: #0ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px #0ff;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: all 0.3s;
        }

        #hint {
            position: absolute;
            top: 20px;
            width: 90%;
            left: 5%;
            text-align: center;
            color: #0ff;
            font-size: 11px;
            pointer-events: none;
            letter-spacing: 1px;
            text-shadow: 0 0 8px #0ff;
            opacity: 0.9;
            z-index: 2000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="hint">SISTEMA MS3 - INICIALIZANDO NÚCLEO...</div>
    
    <div id="vr-toggle-ui">
        <button class="cyber-button" id="btn-vr-mode">MODO VR (DIVIDIR)</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Manejo de errores para GitHub: Si no hay config, el app sigue corriendo sin Firebase
        let db = null, auth = null, appId = 'ms3-fallback';
        try {
            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'ms3-vr-app';
            }
        } catch(e) { console.warn("Firebase no configurado (Modo Local)"); }

        let scene, camera, renderer, starField, logoGroup, startBtn3D, resetBtn3D, gamesBtn3D, avatarBtn3D;
        let isSplitScreen = false, hasGyro = false, currentView = "HOME"; 
        let raycaster = new THREE.Raycaster();
        let interactableObjects = [];
        let hoverTimer = 0, hoveredObject = null;
        let programScreens = [], gameScreens = [];
        let currentUser = null;
        
        let mouseX = 0, mouseY = 0, targetRotationX = 0, targetRotationY = 0;
        let deviceQuaternion = new THREE.Quaternion();
        let worldQuaternion = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

        // LUX Avatar
        let luxGroup, luxParts = { head: null, body: null };
        let luxSettings = { color: 0x00ffff };

        let activeVideo = null, vSphere;
        let videos = [], textures = [];
        const videoUrls = [
            "https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4",
            "https://storage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4"
        ];

        let crosshair, loadingRing;

        async function initAuth() {
            if (!auth) return;
            try { await signInAnonymously(auth); } catch (e) { console.error("Error Auth:", e); }
        }

        if (auth) {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('hint').innerText = "MS3 - CONECTADO";
                    loadUserAvatar();
                }
            });
        }

        async function loadUserAvatar() {
            if (!db || !currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'lux_avatar');
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    luxSettings = snap.data();
                    applyAvatarColors();
                }
            } catch(e) {}
        }

        async function saveUserAvatar() {
            if (!db || !currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'lux_avatar');
                await setDoc(docRef, luxSettings);
                document.getElementById('hint').innerText = "AVATAR LUX GUARDADO EN LA NUBE";
            } catch(e) {}
        }

        window.onload = () => {
            initAuth();
            init();
            setupMedia();
            animate();
            
            const onFirstInteraction = () => {
                startSystem();
                window.removeEventListener('touchstart', onFirstInteraction);
                window.removeEventListener('mousedown', onFirstInteraction);
            };
            window.addEventListener('touchstart', onFirstInteraction);
            window.addEventListener('mousedown', onFirstInteraction);
            window.addEventListener('mousemove', (e) => {
                if (!hasGyro) {
                    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
                    targetRotationY = mouseX * 0.8; 
                    targetRotationX = mouseY * 0.4; 
                }
            });

            document.getElementById('btn-vr-mode').onclick = (e) => {
                e.stopPropagation();
                toggleVR();
            };
        };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for (let i = 0; i < 6000; i++) starPos.push((Math.random()-0.5)*1200, (Math.random()-0.5)*1200, (Math.random()-0.5)*1200);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x00ffff, size: 0.5, transparent: true, opacity: 0.6 }));
            scene.add(starField);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            
            create3DUI();
            create3DWordLogo();
            createStartButton();
            createLowerControls();
            createLuxAvatar();
            
            window.addEventListener('resize', onWindowResize);
            document.getElementById('hint').innerText = "LISTO PARA INICIAR";
        }

        function createLuxAvatar() {
            luxGroup = new THREE.Group();
            const bodyGeo = new THREE.IcosahedronGeometry(1.5, 0);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0x004444, wireframe: true });
            luxParts.body = new THREE.Mesh(bodyGeo, bodyMat);
            
            const headGeo = new THREE.SphereGeometry(0.7, 32, 32);
            const headMat = new THREE.MeshPhongMaterial({ color: luxSettings.color, emissive: luxSettings.color, emissiveIntensity: 0.5 });
            luxParts.head = new THREE.Mesh(headGeo, headMat);
            luxParts.head.position.y = 1.8;

            luxGroup.add(luxParts.body, luxParts.head);
            luxGroup.position.set(0, 0, -15);
            luxGroup.visible = false;
            scene.add(luxGroup);

            const palette = [0x00ffff, 0xff00ff, 0xffff00, 0x00ff00, 0xff4400, 0xffffff];
            palette.forEach((col, i) => {
                const orb = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshPhongMaterial({ color: col, emissive: col, emissiveIntensity: 0.3 }));
                const angle = (i / palette.length) * Math.PI * 2;
                orb.position.set(Math.cos(angle) * 5, Math.sin(angle) * 3 + 1, 0);
                orb.userData = { isColorPicker: true, color: col };
                luxGroup.add(orb);
            });
        }

        function applyAvatarColors() {
            if (luxParts.head) {
                luxParts.head.material.color.setHex(luxSettings.color);
                luxParts.head.material.emissive.setHex(luxSettings.color);
            }
            if (luxParts.body) luxParts.body.material.color.setHex(luxSettings.color);
        }

        function createStartButton() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(6, 1.6, 0.5), new THREE.MeshPhongMaterial({ color: 0x000000, transparent: true, opacity: 0.9 }));
            const edges = new THREE.LineSegments(new THREE.EdgesGeometry(body.geometry), new THREE.LineBasicMaterial({ color: 0x00ffff }));
            
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#00ffff"; ctx.font = "Bold 60px Orbitron"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText("COMENZAR", 256, 64);
            
            const txt = new THREE.Mesh(new THREE.PlaneGeometry(5, 1.2), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
            txt.position.z = 0.3;
            group.add(body, edges, txt);
            group.position.set(0, -3.5, -11);
            startBtn3D = group;
            scene.add(group);
            interactableObjects.push(body);
            body.userData.isStart = true;
        }

        function updateBtnText(btn, text) {
            const txtMesh = btn.getObjectByName("text_mesh");
            const canvas = txtMesh.material.map.image;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,512,128);
            ctx.fillStyle = "#0ff"; ctx.font = "Bold 40px Orbitron"; ctx.textAlign = "center"; ctx.fillText(text, 256, 75);
            txtMesh.material.map.needsUpdate = true;
        }

        function createLowerControls() {
            const geo = new THREE.BoxGeometry(4, 1.2, 0.2);
            const createBtn = (x, color, type) => {
                const group = new THREE.Group();
                const body = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0x000000, transparent: true, opacity: 0.8, emissive: color, emissiveIntensity: 0.1 }));
                const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: color }));
                const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 128;
                const txt = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 1), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
                txt.position.z = 0.15; txt.name = "text_mesh";
                group.add(body, edges, txt);
                group.position.set(x, -18, -12);
                group.rotation.x = -Math.PI/4;
                group.visible = false;
                group.userData = { [type]: true };
                scene.add(group);
                interactableObjects.push(body);
                body.userData = group.userData;
                return group;
            };

            resetBtn3D = createBtn(-5, 0x00ffff, "isReset"); updateBtnText(resetBtn3D, "INICIO");
            gamesBtn3D = createBtn(0, 0xff00ff, "isGames"); updateBtnText(gamesBtn3D, "JUEGOS");
            avatarBtn3D = createBtn(5, 0xffff00, "isAvatar"); updateBtnText(avatarBtn3D, "AVATAR LUX");
        }

        function create3DWordLogo() {
            logoGroup = new THREE.Group();
            const loader = new THREE.FontLoader();
            loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                const textGeo = new THREE.TextGeometry("MS3", { font: font, size: 2.8, height: 1.2 });
                textGeo.center();
                const mesh = new THREE.Mesh(textGeo, new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x004444 }));
                logoGroup.add(mesh);
            });
            logoGroup.position.set(0, 2, -12);
            scene.add(logoGroup);
        }

        function create3DUI() {
            const group = new THREE.Group();
            crosshair = new THREE.Mesh(new THREE.TorusGeometry(0.015, 0.002, 8, 32), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 }));
            loadingRing = new THREE.Mesh(new THREE.TorusGeometry(0.025, 0.003, 8, 32), new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0 }));
            group.add(crosshair, loadingRing);
            group.position.z = -1;
            camera.add(group);
            scene.add(camera);
        }

        function handleInteractions() {
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects([...interactableObjects, ...luxGroup.children]);
            
            if (hits.length > 0) {
                const hit = hits[0].object;
                if (hoveredObject !== hit) { hoveredObject = hit; hoverTimer = 0; }
                hoverTimer += 1/60;
                const p = Math.min(hoverTimer / 1.2, 1);
                crosshair.scale.set(1 + p, 1 + p, 1);
                loadingRing.scale.set(p * 1.5, p * 1.5, 1);
                loadingRing.material.opacity = 1;

                if (p >= 1) {
                    if (hit.userData.isStart) enterPrograms();
                    else if (hit.userData.isReset) goHome();
                    else if (hit.userData.isGames) goGames();
                    else if (hit.userData.isAvatar) goAvatar();
                    else if (hit.userData.isColorPicker) {
                        luxSettings.color = hit.userData.color;
                        applyAvatarColors();
                        saveUserAvatar();
                    }
                    else if (hit.userData.videoId !== undefined) playVideo(hit.userData.videoId);
                    else if (hit.userData.isBack) exitMedia();
                    hoverTimer = 0;
                }
            } else {
                hoveredObject = null; hoverTimer = 0;
                loadingRing.material.opacity = 0;
                crosshair.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
            }
        }

        function enterPrograms() {
            currentView = "PROGRAMS";
            startBtn3D.visible = false;
            logoGroup.position.set(0, 15, -20);
            resetBtn3D.visible = true; gamesBtn3D.visible = true; avatarBtn3D.visible = true;
            showProgramGrid();
        }

        function goHome() {
            currentView = "HOME"; clearGrid();
            resetBtn3D.visible = false; gamesBtn3D.visible = false; avatarBtn3D.visible = false;
            startBtn3D.visible = true; luxGroup.visible = false;
            logoGroup.position.set(0, 2, -12);
        }

        function goGames() {
            currentView = "GAMES"; clearGrid();
            luxGroup.visible = false;
            document.getElementById('hint').innerText = "SECCIÓN JUEGOS";
        }

        function goAvatar() {
            currentView = "AVATAR"; clearGrid();
            luxGroup.visible = true;
            document.getElementById('hint').innerText = "PERSONALIZADOR LUX - MIRA LOS ORBES";
        }

        function clearGrid() {
            programScreens.forEach(s => scene.remove(s));
            programScreens = [];
        }

        function showProgramGrid() {
            currentView = "PROGRAMS"; clearGrid();
            luxGroup.visible = false;
            const count = 6, radius = 18;
            for(let i=0; i<count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(8, 4.5), new THREE.MeshBasicMaterial({ map: textures[i % textures.length] }));
                mesh.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
                mesh.lookAt(0,0,0);
                scene.add(mesh);
                programScreens.push(mesh);
                mesh.userData.videoId = i;
                interactableObjects.push(mesh);
            }
        }

        function playVideo(idx) {
            currentView = "PLAYING";
            activeVideo = videos[idx % textures.length];
            vSphere.material.map = textures[idx % textures.length];
            vSphere.visible = true; vSphere.material.opacity = 1;
            activeVideo.muted = false; activeVideo.play();
            const backBtn = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 0.1), new THREE.MeshBasicMaterial({ color: 0xff0044 }));
            backBtn.position.set(0, -6, -12);
            backBtn.userData.isBack = true;
            scene.add(backBtn);
            interactableObjects.push(backBtn);
        }

        function exitMedia() {
            if (activeVideo) { activeVideo.pause(); activeVideo.muted = true; }
            vSphere.visible = false;
            interactableObjects.forEach(obj => { if(obj.userData.isBack) scene.remove(obj); });
            showProgramGrid();
        }

        function setupMedia() {
            videoUrls.forEach(url => {
                const v = document.createElement('video');
                v.src = url; v.crossOrigin = "anonymous"; v.loop = true; v.muted = true; v.playsInline = true;
                v.load(); videos.push(v); textures.push(new THREE.VideoTexture(v));
            });
            vSphere = new THREE.Mesh(new THREE.SphereGeometry(40, 60, 40), new THREE.MeshBasicMaterial({ side: THREE.BackSide, transparent: true, opacity: 0 }));
            vSphere.scale.set(-1, 1, 1);
            vSphere.visible = false;
            scene.add(vSphere);
        }

        function onWindowResize() {
            const aspect = isSplitScreen ? (window.innerWidth/2)/window.innerHeight : window.innerWidth/window.innerHeight;
            camera.aspect = aspect; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function toggleVR() { isSplitScreen = !isSplitScreen; onWindowResize(); }

        function startSystem() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(r => {
                    if (r === 'granted') window.addEventListener('deviceorientation', onDeviceOrientation, true);
                });
            } else { window.addEventListener('deviceorientation', onDeviceOrientation, true); }
        }

        function onDeviceOrientation(e) {
            if (e.alpha !== null) {
                hasGyro = true;
                const a = THREE.MathUtils.degToRad(e.alpha), b = THREE.MathUtils.degToRad(e.beta), g = THREE.MathUtils.degToRad(e.gamma);
                deviceQuaternion.setFromEuler(new THREE.Euler(b, a, -g, 'YXZ')).multiply(worldQuaternion);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (hasGyro) camera.quaternion.slerp(deviceQuaternion, 0.1);
            else {
                camera.rotation.y += (targetRotationY - camera.rotation.y) * 0.05;
                camera.rotation.x += (targetRotationX - camera.rotation.x) * 0.05;
            }
            if (logoGroup) logoGroup.rotation.y += 0.01;
            if (luxGroup && luxGroup.visible) {
                luxGroup.rotation.y += 0.005;
                luxParts.head.position.y = 1.8 + Math.sin(Date.now() * 0.002) * 0.1;
            }
            handleInteractions();
            if (isSplitScreen) {
                const w = window.innerWidth / 2, h = window.innerHeight;
                renderer.setScissorTest(true);
                renderer.setViewport(0,0,w,h); renderer.setScissor(0,0,w,h);
                camera.translateX(-0.05); renderer.render(scene, camera); camera.translateX(0.05);
                renderer.setViewport(w,0,w,h); renderer.setScissor(w,0,w,h);
                camera.translateX(0.05); renderer.render(scene, camera); camera.translateX(-0.05);
            } else {
                renderer.setScissorTest(false);
                renderer.render(scene, camera);
            }
        }
    </script>
</body>
</html>
